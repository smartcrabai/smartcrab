name: Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun workspace tests
        run: bun test

      - name: Install swiftformat
        run: brew install swiftformat

      - name: Install actionlint
        run: brew install actionlint

      - name: Run swiftformat (lint mode)
        run: swiftformat --lint apps/macos

      - name: Run actionlint
        run: actionlint
