name: Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run package tests (only stable packages for now)
        run: |
          bun test packages/ipc-protocol packages/seher-config-schema

      - name: Install swiftformat
        run: brew install swiftformat

      - name: Install actionlint
        run: brew install actionlint

      - name: Run swiftformat (lint mode)
        run: swiftformat --lint apps/macos

      - name: Run actionlint
        run: actionlint
